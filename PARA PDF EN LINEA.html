<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Empresa — Documento</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f4f0;
      --gray-1: #1a1a1a;
      --gray-2: #2e2e2e;
      --gray-3: #4a4a4a;
      --gray-4: #888;
      --gray-5: #bbb;
      --accent: #e8e4db;
      --border: rgba(255,255,255,0.08);
      --radius: 6px;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--white);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark span {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--black);
      letter-spacing: 0;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
      text-decoration: none;
    }
    .btn-ghost {
      background: transparent;
      color: var(--gray-5);
      border: 1px solid var(--gray-2);
    }
    .btn-ghost:hover { background: var(--gray-2); color: var(--white); }
    .btn-ghost:disabled { opacity: 0.3; cursor: default; }

    .btn-primary {
      background: var(--white);
      color: var(--black);
    }
    .btn-primary:hover { background: var(--accent); }

    .page-info {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--gray-4);
      padding: 0 8px;
      white-space: nowrap;
    }

    /* ── MAIN ── */
    main {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── DOCUMENT META ── */
    .doc-header {
      width: 100%;
      max-width: 860px;
      padding: 32px 24px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }
    .doc-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--white);
      margin-bottom: 4px;
    }
    .doc-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--gray-4);
      letter-spacing: 0.04em;
    }

    /* ── PDF CANVAS AREA ── */
    #pdf-container {
      width: 100%;
      max-width: 860px;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .page-wrapper {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 40px rgba(0,0,0,0.6);
      background: #fff;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.4s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    canvas { display: block; width: 100% !important; height: auto !important; }

    /* ── LOADING ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 0;
      color: var(--gray-4);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--gray-2);
      border-top-color: var(--gray-5);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'DM Mono', monospace; font-size: 12px; }

    /* ── ERROR ── */
    #error-msg {
      display: none;
      text-align: center;
      padding: 60px 24px;
      color: var(--gray-4);
    }
    #error-msg h2 { font-size: 16px; font-weight: 400; margin-bottom: 8px; color: var(--white); }
    #error-msg p { font-size: 13px; line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--gray-3);
      border-top: 1px solid var(--border);
      margin-top: 0;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .page-info { display: none; }
      .doc-header { padding: 24px 16px 16px; flex-direction: column; }
      #pdf-container { padding: 0 12px 40px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-mark"><span>MI</span></div>
    MI EMPRESA
  </a>
  <div class="header-controls">
    <button class="btn btn-ghost" id="btn-prev" disabled>← Ant</button>
    <span class="page-info" id="page-info">— / —</span>
    <button class="btn btn-ghost" id="btn-next" disabled>Sig →</button>
    <a class="btn btn-primary" id="btn-download" href="#" download>
      ↓ Descargar
    </a>
  </div>
</header>

<main>
  <div class="doc-header">
    <div>
      <div class="doc-title" id="doc-title">Documento</div>
      <div class="doc-meta" id="doc-meta">Cargando…</div>
    </div>
  </div>

  <div id="pdf-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Cargando documento…</p>
    </div>
    <div id="error-msg">
      <h2>No se pudo cargar el documento</h2>
      <p>Verifica que la URL del PDF sea correcta y que el archivo sea público.</p>
    </div>
  </div>
</main>

<footer>
  MI EMPRESA &nbsp;·&nbsp; Documento confidencial
</footer>

<script>
  // ─────────────────────────────────────────────
  //  CONFIGURACIÓN  ← Edita solo este bloque
  // ─────────────────────────────────────────────
  const CONFIG = {
    // Pon aquí la URL directa a tu PDF
    // Ejemplo Google Drive: cambia /view por /export?format=pdf
    pdfUrl: 'https://www.africau.edu/images/default/sample.pdf',

    // Nombre que aparece en el header
    docTitle: 'Catálogo de Productos 2025',

    // Info secundaria
    docMeta: 'MI EMPRESA · Actualizado Abril 2026',

    // Nombre del archivo al descargar
    downloadName: 'catalogo-mi-empresa-2025.pdf',
  };
  // ─────────────────────────────────────────────

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const container  = document.getElementById('pdf-container');
  const loading    = document.getElementById('loading');
  const errorMsg   = document.getElementById('error-msg');
  const pageInfo   = document.getElementById('page-info');
  const btnPrev    = document.getElementById('btn-prev');
  const btnNext    = document.getElementById('btn-next');
  const btnDl      = document.getElementById('btn-download');

  document.getElementById('doc-title').textContent = CONFIG.docTitle;
  document.getElementById('doc-meta').textContent  = CONFIG.docMeta;
  btnDl.href = CONFIG.pdfUrl;
  btnDl.setAttribute('download', CONFIG.downloadName);

  let pdfDoc = null;
  let currentPage = 1;
  let totalPages  = 0;
  let rendering   = false;
  const canvases  = {};

  async function renderPage(num) {
    if (rendering) return;
    rendering = true;
    currentPage = num;
    updateNav();

    const page = await pdfDoc.getPage(num);
    const vp   = page.getViewport({ scale: 2.2 });

    let wrapper = canvases[num];
    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.className = 'page-wrapper';
      wrapper.style.animationDelay = '0ms';
      const cv = document.createElement('canvas');
      cv.width  = vp.width;
      cv.height = vp.height;
      wrapper.appendChild(cv);
      container.appendChild(wrapper);
      canvases[num] = wrapper;
      await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
    }

    rendering = false;
  }

  async function renderAll() {
    for (let i = 1; i <= Math.min(totalPages, 30); i++) {
      await renderPage(i);
    }
  }

  function updateNav() {
    pageInfo.textContent = `${currentPage} / ${totalPages}`;
    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
  }

  btnPrev.addEventListener('click', () => {
    if (currentPage > 1) scrollToPage(currentPage - 1);
  });
  btnNext.addEventListener('click', () => {
    if (currentPage < totalPages) scrollToPage(currentPage + 1);
  });

  function scrollToPage(num) {
    currentPage = num;
    updateNav();
    const wrapper = canvases[num];
    if (wrapper) wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Intersection observer para actualizar número de página actual
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const num = parseInt(e.target.dataset.page);
        if (num) { currentPage = num; updateNav(); }
      }
    });
  }, { threshold: 0.4 });

  pdfjsLib.getDocument(CONFIG.pdfUrl).promise
    .then(async pdf => {
      pdfDoc    = pdf;
      totalPages = pdf.numPages;
      loading.style.display = 'none';
      updateNav();
      btnPrev.disabled = false;
      btnNext.disabled = false;

      for (let i = 1; i <= Math.min(totalPages, 30); i++) {
        const page = await pdfDoc.getPage(i);
        const vp   = page.getViewport({ scale: 2.2 });

        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.dataset.page = i;
        wrapper.style.animationDelay = `${(i - 1) * 60}ms`;

        const cv = document.createElement('canvas');
        cv.width  = vp.width;
        cv.height = vp.height;
        wrapper.appendChild(cv);
        container.appendChild(wrapper);
        canvases[i] = wrapper;
        observer.observe(wrapper);

        await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
      }
    })
    .catch(err => {
      loading.style.display = 'none';
      errorMsg.style.display = 'block';
      console.error(err);
    });
</script>
</body>
</html>
